name: CI

on:
  push:
  pull_request:

jobs:
  check-changes:
    runs-on: ubuntu-latest

    outputs:
      python-code-changed: ${{ steps.filter.outputs.python-code }}

    steps:
      - uses: actions/checkout@v4

      - name: Filter changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python-code:
              - 'backend/**.py'

  test:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.python-code-changed == 'true' }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv & restore cache
        uses: astral-sh/setup-uv@v7.3.1
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            backend/pyproject.toml

      - name: Sync dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run tests
        working-directory: backend
        run: uv run pytest --durations=10 -vv