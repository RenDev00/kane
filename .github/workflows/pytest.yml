name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv & restore cache
        uses: astral-sh/setup-uv@v7.3.1
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --durations=10 -vv